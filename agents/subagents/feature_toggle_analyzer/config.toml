name = "feature-toggle-analyzer"
description = "Finds feature toggles affecting one entrypoint and documents both behaviors."
output = "structured"
response_model = "models:FeatureToggleAnalysis"

[[permissions]]
operations = ["read"]
paths = ["/repo", "/repo/**"]
mode = "allow"

[[permissions]]
operations = ["read", "write"]
paths = ["/**"]
mode = "deny"
