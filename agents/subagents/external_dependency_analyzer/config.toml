name = "external-dependency-analyzer"
description = "Finds external calls made by one entrypoint, including REST, SOAP, and Kafka producers."
output = "structured"
response_model = "models:ExternalDependencyAnalysis"

[[permissions]]
operations = ["read"]
paths = ["/repo", "/repo/**"]
mode = "allow"

[[permissions]]
operations = ["read", "write"]
paths = ["/**"]
mode = "deny"
