name = "rest-api-extractor"
role = "discoverer"
description = """Scans the Java/Kotlin codebase under /repo and returns the \
complete list of REST API endpoints (Spring MVC/WebFlux, JAX-RS) as \
structured RestEndpoints."""

# Agent-local Pydantic model the final answer is coerced into.
output = "structured"
response_model = "models:RestEndpoints"

# "/repo" itself is listed too: the "/repo/**" glob matches files under the
# mount but not the mount point, which would deny `ls` on the repo root — the
# natural first move for a subagent.
[[permissions]]
operations = ["read"]
paths = ["/repo", "/repo/**"]
mode = "allow"

# Everything outside the repo mount is off-limits.
[[permissions]]
operations = ["read", "write"]
paths = ["/**"]
mode = "deny"
