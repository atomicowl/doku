name = "soap-api-extractor"
role = "discoverer"
description = """Scans the Java/Kotlin codebase under /repo and returns the \
complete list of SOAP API operations (Spring-WS, JAX-WS/CXF) as structured \
DiscoveredItems."""

# Pydantic model from doku.models the subagent's final answer is coerced into.
response_format = "DiscoveredItems"

# "/repo" itself is listed too: the "/repo/**" glob matches files under the
# mount but not the mount point, which would deny `ls` on the repo root — the
# natural first move for a subagent.
[[permissions]]
operations = ["read"]
paths = ["/repo", "/repo/**"]
mode = "allow"

# Everything outside the repo mount is off-limits.
[[permissions]]
operations = ["read", "write"]
paths = ["/**"]
mode = "deny"
