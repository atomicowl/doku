name = "document-codebase"
description = "Discover and document Java/Kotlin application entrypoints."
prompt = "prompt.md"
subagents = [
  "rest-api-extractor",
  "kafka-consumer-extractor",
  "soap-api-extractor",
  "decision-flow-analyzer",
  "feature-toggle-analyzer",
  "external-dependency-analyzer",
  "entrypoint-documenter",
]
output = "text"
finalizer = "finalize:finalize"

[prompt_variables]
DOCUMENTER = "entrypoint-documenter"
FLOW_ANALYZER = "decision-flow-analyzer"
TOGGLE_ANALYZER = "feature-toggle-analyzer"
DEPENDENCY_ANALYZER = "external-dependency-analyzer"
DISCOVERERS_LIST = """- `rest-api-extractor` — Finds REST endpoints.
- `kafka-consumer-extractor` — Finds Kafka consumers.
- `soap-api-extractor` — Finds SOAP operations."""
DISCOVERERS_JS = """[
  {"subagentType":"rest-api-extractor","label":"discover-rest"},
  {"subagentType":"kafka-consumer-extractor","label":"discover-kafka"},
  {"subagentType":"soap-api-extractor","label":"discover-soap"}
]"""
